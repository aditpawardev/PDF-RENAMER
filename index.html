<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lab PDF Renamer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #202026;
    --border: #2e2e38;
    --accent: #7f77dd;
    --accent-dim: #3c3489;
    --accent-glow: rgba(127,119,221,0.15);
    --text: #e8e7f4;
    --muted: #8887a0;
    --green: #1d9e75;
    --green-dim: rgba(29,158,117,0.15);
    --red: #e24b4a;
    --red-dim: rgba(226,75,74,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .wrap { max-width: 700px; margin: 0 auto; }

  header { margin-bottom: 2.5rem; }
  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #fff;
  }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .fields-grid .span2 { grid-column: span 2; }

  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-group label { font-size: 12px; color: var(--muted); font-weight: 500; }

  input[type="text"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type="text"]::placeholder { color: #4a4a5a; }
  input[type="text"]:focus { border-color: var(--accent); }

  .preview-pill {
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 10px;
  }
  .preview-pill .dim { color: #5a5880; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    width: 40px; height: 40px; margin: 0 auto 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .drop-icon svg { width: 20px; height: 20px; stroke: var(--muted); fill: none; }
  .drop-zone p { color: var(--muted); font-size: 13px; }
  .drop-zone strong { color: var(--text); font-weight: 500; }

  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }

  .file-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: grab;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .file-item:active { cursor: grabbing; }
  .file-item.dragging { opacity: 0.4; }
  .file-item.drag-over { border-color: var(--accent); background: var(--accent-glow); }

  .drag-handle { color: var(--border); flex-shrink: 0; cursor: grab; }
  .drag-handle svg { width: 16px; height: 16px; fill: currentColor; display: block; }

  .file-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: var(--accent-dim);
    color: #a09de8;
    border-radius: 5px;
    padding: 2px 7px;
    flex-shrink: 0;
    min-width: 32px;
    text-align: center;
  }

  .file-name {
    flex: 1;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-name .orig { color: var(--muted); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .remove-btn {
    background: none; border: none; color: var(--border);
    cursor: pointer; padding: 2px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--red); }
  .remove-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.99); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .status {
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    color: var(--muted);
    min-height: 18px;
  }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }

  .badge-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
  }
  .badge {
    font-size: 11px;
    border-radius: 5px;
    padding: 3px 8px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .badge-g { background: var(--green-dim); color: var(--green); }
  .badge-r { background: var(--red-dim); color: var(--red); }

  @media (max-width: 500px) {
    .fields-grid { grid-template-columns: 1fr; }
    .fields-grid .span2 { grid-column: span 1; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;">
      <div>
        <h1>Lab PDF <span>Renamer</span></h1>
        <p>Upload your practicals, drag to set order, fill your details — download renamed files instantly.</p>
      </div>
      <a href="https://github.com/aditpawardev" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:500;white-space:nowrap;transition:color 0.15s,border-color 0.15s;flex-shrink:0;" onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--accent)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.744 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        aditpawardev
      </a>
    </div>
  </header>

  <!-- CREDENTIALS -->
  <div class="section-label">Your credentials</div>
  <div class="card">
    <div class="fields-grid">
      <div class="field-group">
        <label>Roll Number</label>
        <input type="text" id="roll" placeholder="23CE1045" maxlength="20" />
      </div>
      <div class="field-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Adit Pawar" maxlength="40" />
      </div>
      <div class="field-group">
        <label>Batch</label>
        <input type="text" id="batch" placeholder="D1" maxlength="10" />
      </div>
      <div class="field-group">
        <label>Subject Code</label>
        <input type="text" id="subject" placeholder="CC" maxlength="15" />
      </div>
      <div class="field-group span2">
        <label>Experiment prefix (before number)</label>
        <input type="text" id="expprefix" placeholder="Expt" maxlength="20" />
      </div>
    </div>
    <div class="preview-pill" id="preview">
      <span class="dim">preview will appear here...</span>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="section-label">Upload PDFs</div>
  <div class="card" style="padding: 0; overflow: hidden;">
    <div class="drop-zone" id="dropzone">
      <input type="file" id="fileInput" accept=".pdf" multiple />
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
      </div>
      <p><strong>Click to upload</strong> or drag & drop PDFs here</p>
      <p style="margin-top:4px;font-size:11px;">Multiple files supported — reorder below after upload</p>
    </div>
    <div class="file-list" id="fileList" style="padding: 0 1rem 1rem;"></div>
  </div>

  <!-- DOWNLOAD -->
  <button class="btn btn-primary" id="downloadBtn" disabled>Download Renamed PDFs</button>
  <div class="status" id="status"></div>
</div>

<script>
const rollEl = document.getElementById('roll');
const nameEl = document.getElementById('name');
const batchEl = document.getElementById('batch');
const subjectEl = document.getElementById('subject');
const expPrefixEl = document.getElementById('expprefix');
const previewEl = document.getElementById('preview');
const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const fileListEl = document.getElementById('fileList');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl = document.getElementById('status');

let files = [];
let dragSrcIdx = null;

function sanitize(str) {
  return str.trim().replace(/\s+/g, ' ');
}

function buildName(roll, name, batch, subject, prefix, num) {
  const n = String(num).padStart(2, '0');
  return `${roll}_${name}_${batch}_${subject}_${prefix}_${n}.pdf`;
}

function updatePreview() {
  const roll = sanitize(rollEl.value) || '23CE1045';
  const name = sanitize(nameEl.value) || 'Your Name';
  const batch = sanitize(batchEl.value) || 'D1';
  const subject = sanitize(subjectEl.value) || 'SUB';
  const prefix = sanitize(expPrefixEl.value) || 'Expt';
  const ex = buildName(roll, name, batch, subject, prefix, 1);
  previewEl.innerHTML = ex;
}

[rollEl, nameEl, batchEl, subjectEl, expPrefixEl].forEach(el => el.addEventListener('input', () => { updatePreview(); renderList(); }));
updatePreview();

fileInput.addEventListener('change', e => addFiles(Array.from(e.target.files)));

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('dragover');
  const dropped = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  addFiles(dropped);
});

function addFiles(newFiles) {
  const pdfs = newFiles.filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  if (!pdfs.length) { showStatus('Only PDF files are accepted.', true); return; }
  files = files.concat(pdfs);
  renderList();
  showStatus('');
}

function renderList() {
  fileListEl.innerHTML = '';
  if (!files.length) { downloadBtn.disabled = true; return; }
  downloadBtn.disabled = false;
  const roll = sanitize(rollEl.value) || 'ROLL';
  const name = sanitize(nameEl.value) || 'Name';
  const batch = sanitize(batchEl.value) || 'BATCH';
  const subject = sanitize(subjectEl.value) || 'SUB';
  const prefix = sanitize(expPrefixEl.value) || 'Expt';

  files.forEach((f, i) => {
    const newName = buildName(roll, name, batch, subject, prefix, i + 1);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.draggable = true;
    item.dataset.idx = i;
    item.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">
        <svg viewBox="0 0 16 16"><circle cx="5.5" cy="4" r="1.2"/><circle cx="10.5" cy="4" r="1.2"/><circle cx="5.5" cy="8" r="1.2"/><circle cx="10.5" cy="8" r="1.2"/><circle cx="5.5" cy="12" r="1.2"/><circle cx="10.5" cy="12" r="1.2"/></svg>
      </span>
      <span class="file-num">E${String(i+1).padStart(2,'0')}</span>
      <div class="file-name">
        <div>${newName}</div>
        <div class="orig">${f.name}</div>
      </div>
      <button class="remove-btn" data-idx="${i}" title="Remove">
        <svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    `;
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragover', onDragOver);
    item.addEventListener('drop', onDrop);
    item.addEventListener('dragend', onDragEnd);
    item.querySelector('.remove-btn').addEventListener('click', removeFile);
    fileListEl.appendChild(item);
  });
}

function removeFile(e) {
  const idx = parseInt(e.currentTarget.dataset.idx);
  files.splice(idx, 1);
  renderList();
}

function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e) {
  e.preventDefault();
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
  this.classList.add('drag-over');
  e.dataTransfer.dropEffect = 'move';
}
function onDrop(e) {
  e.stopPropagation();
  const targetIdx = parseInt(this.dataset.idx);
  if (dragSrcIdx !== null && dragSrcIdx !== targetIdx) {
    const moved = files.splice(dragSrcIdx, 1)[0];
    files.splice(targetIdx, 0, moved);
    renderList();
  }
}
function onDragEnd() {
  document.querySelectorAll('.file-item').forEach(el => { el.classList.remove('dragging'); el.classList.remove('drag-over'); });
  dragSrcIdx = null;
}

function showStatus(msg, isErr) {
  statusEl.textContent = msg;
  statusEl.className = 'status' + (isErr ? ' err' : ' ok');
}

downloadBtn.addEventListener('click', async () => {
  if (!files.length) return;
  const roll = sanitize(rollEl.value);
  const uname = sanitize(nameEl.value);
  const batch = sanitize(batchEl.value);
  const subject = sanitize(subjectEl.value);
  const prefix = sanitize(expPrefixEl.value) || 'Expt';

  const missing = [];
  if (!roll) missing.push('Roll Number');
  if (!uname) missing.push('Name');
  if (!batch) missing.push('Batch');
  if (!subject) missing.push('Subject Code');
  if (missing.length) { showStatus('Please fill in: ' + missing.join(', '), true); return; }

  showStatus('Preparing files...');
  downloadBtn.disabled = true;

  try {
    if (files.length === 1) {
      const newName = buildName(roll, uname, batch, subject, prefix, 1);
      const buf = await files[0].arrayBuffer();
      const blob = new Blob([buf], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = newName; a.click();
      URL.revokeObjectURL(url);
      showStatus('Downloaded: ' + newName);
    } else {
      const JSZip = window.JSZip;
      if (!JSZip) { showStatus('Loading zip library...'); return; }
      const zip = new JSZip();
      for (let i = 0; i < files.length; i++) {
        const newName = buildName(roll, uname, batch, subject, prefix, i + 1);
        const buf = await files[i].arrayBuffer();
        zip.file(newName, buf);
      }
      const blob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${roll}_${uname}_${subject}_practicals.zip`;
      a.click();
      URL.revokeObjectURL(url);
      showStatus(`Downloaded ${files.length} files as ZIP!`);
    }
  } catch(err) {
    showStatus('Error: ' + err.message, true);
  }
  downloadBtn.disabled = false;
});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
